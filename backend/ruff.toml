# Ruff configuration — Python linter + formatter
# https://docs.astral.sh/ruff/

target-version = "py312"
line-length = 100

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "T20",   # flake8-print
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific rules
    "ASYNC", # flake8-async
]
ignore = [
    "S105",  # hardcoded password — false positives on config defaults
    "S106",  # hardcoded password in func arg
    "B008",  # function call in default arg — FastAPI Depends() pattern
]

[lint.per-file-ignores]
"tests/**" = [
    "S101",  # allow assert in tests
    "S106",  # allow hardcoded passwords in tests
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"

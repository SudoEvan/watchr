# ── Watchr Deploy — Gitea Actions ────────────────────────────────
# Runs ONLY on push to main (i.e. after merge / direct push).
# CI checks (lint + test) run separately via ci.yml.
# Deploy proceeds only after CI passes.
#
# Required Gitea secrets (repo → Settings → Actions → Secrets):
#   SYNOLOGY_HOST         – Synology IP or hostname
#   SYNOLOGY_SSH_PORT     – SSH port (default 22)
#   SYNOLOGY_USER         – SSH user on Synology
#   SYNOLOGY_SSH_KEY      – Private SSH key (ed25519 or RSA, base64-encoded)
#   DEPLOY_PATH           – Absolute path to the repo on Synology
#                           e.g. /volume1/docker/watchr

name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Deploy to Synology ────────────────────────────────────────
  deploy:
    runs-on: docker
    container: python:3.12-slim
    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SYNOLOGY_SSH_KEY }}
          SSH_HOST: ${{ secrets.SYNOLOGY_HOST }}
          SSH_PORT: ${{ secrets.SYNOLOGY_SSH_PORT }}
          SSH_USER: ${{ secrets.SYNOLOGY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          apt-get update -qq && apt-get install -y -qq openssh-client >/dev/null 2>&1
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${SSH_KEY}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_deploy -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" bash --login -s -- "${DEPLOY_PATH}" <<'SCRIPT'
          set -e
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          DEPLOY_DIR="$1"
          cd "$DEPLOY_DIR"

          echo "==> Pulling latest from main..."
          git fetch origin main
          git reset --hard origin/main

          echo "==> Building and deploying containers..."
          docker compose pull 2>/dev/null || true
          docker compose build --no-cache
          docker compose up -d --force-recreate --remove-orphans

          echo "==> Waiting for backend health check..."
          for i in $(seq 1 30); do
            if docker compose exec -T backend python -c \
              "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')" \
              2>/dev/null; then
              echo "==> Backend healthy!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "==> ERROR: Backend failed health check after 30 attempts"
              docker compose logs --tail=50 backend
              exit 1
            fi
            echo "    Attempt $i/30 — waiting 5s..."
            sleep 5
          done

          echo "==> Cleaning up dangling images..."
          docker image prune -f

          echo "==> Deploy complete!"
          SCRIPT

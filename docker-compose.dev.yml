# Development compose — hot reload for backend (FastAPI) and frontend (Vite HMR)
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchr-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - db-data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - TMDB_VERIFY_SSL=false
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: watchr-frontend
    restart: unless-stopped
    environment:
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
